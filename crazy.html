// 鍔犺浇娑堟伅
function loadMsgs() {
    try { return JSON.parse(localStorage.getItem(STORAGE)) || []; }
    catch { return []; }
}
function saveMsgs(msgs) {
    localStorage.setItem(STORAGE, JSON.stringify(msgs));
}

// 鏇存柊缁熻
function updateStats() {
    const msgs = loadMsgs();
    document.getElementById('totalCount').textContent = msgs.length;

    const today = new Date().toDateString();
    const todayMsgs = msgs.filter(m => new Date(m.time).toDateString() === today);
    document.getElementById('todayCount').textContent = todayMsgs.length;

    const level = Math.min(10, Math.floor(msgs.length / 3));
    document.getElementById('chaosLevel').textContent = level;

    // 浠婂ぉ鏈€娲昏穬
    const posters = {};
    todayMsgs.forEach(m => {
        const name = m.name || '鍖垮悕閲庝汉';
        posters[name] = (posters[name] || 0) + 1;
    });
    const top = Object.entries(posters).sort((a,b) => b[1] - a[1])[0];
    document.getElementById('topPoster').textContent = top ? top[0].slice(0,3) + '..' : '?';
}

// 娓叉煋娑堟伅
function renderMsgs() {
    const list = document.getElementById('msgList');
    const empty = document.getElementById('emptyMsg');
    const msgs = loadMsgs();

    if (msgs.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        updateStats();
        return;
    }
    empty.style.display = 'none';

    list.innerHTML = msgs.map((m, i) => {
        const now = new Date(m.time);
        const timeStr = now.toLocaleString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        const level = m.chaos || 1;
        const name = m.name || '鍖垮悕閲庝汉';
        const mood = m.mood || '馃槑';
        return `<div class="msg-card chaos-level-${level}">
            <div class="msg-header">
                <div class="msg-author">
                    <span>${name}</span>
                    <span class="msg-badge">${mood}</span>
                </div>
                <div class="msg-time">${timeStr}</div>
            </div>
            <div class="msg-content">${escapeHtml(m.text)}</div>
            ${m.tags && m.tags.length ? `<div class="msg-tags">${m.tags.map(t => `<span style="background:#f0f0f0;padding:1px 8px;border-radius:4px;font-size:11px;color:#888;">${t}</span>`).join('')}</div>` : ''}
            <div class="msg-actions">
                <span class="like-btn ${m.liked ? 'liked' : ''}" onclick="likeMsg(${i})">鉂わ笍 ${m.likes || 0}</span>
                <span onclick="replyMsg('${escapeHtml(name)}')">馃挰 锟?/span>
                <span onclick="copyMsg(${i})">馃搵 澶嶅埗</span>
                <span onclick="deleteMsg(${i})" style="color:#e74c3c;">馃棏锟?/span>
            </div>
        </div>`;
    }).join('');

    updateStats();
}

// HTML 杞箟
function escapeHtml(t) {
    const d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
}

// 鎻掑叆 emoji
function insertEmoji(emoji) {
    const ta = document.getElementById('chaosText');
    ta.value += emoji;
    ta.focus();
    updateMadness();
}

// 鐤媯搴﹁锟?function updateMadness() {
    const text = document.getElementById('chaosText').value;
    const len = text.length;
    const bar = document.getElementById('madnessBar');
    const label = document.getElementById('madnessLabel');
    const pct = Math.min(100, (len / 50) * 100);
    bar.style.width = pct + '%';

    if (len < 5) { label.textContent = '鍐烽潤'; bar.style.background = 'linear-gradient(90deg, #2ecc71, var(--gold))'; }
    else if (len < 15) { label.textContent = '寰喓'; bar.style.background = 'linear-gradient(90deg, var(--gold), var(--pink))'; }
    else if (len < 30) { label.textContent = '鍙戠柉锟?; bar.style.background = 'linear-gradient(90deg, var(--pink), var(--purple))'; }
    else { label.textContent = '馃拃 褰诲簳鐤媯'; bar.style.background = 'linear-gradient(90deg, var(--purple), #e74c3c)'; }
}

// 鍙戠柉
function sendChaos() {
    const text = document.getElementById('chaosText').value.trim();
    const name = document.getElementById('chaosName').value.trim() || '鍖垮悕閲庝汉';
    const mood = document.getElementById('chaosMood').value;
    const msgEl = document.getElementById('sendMsg');

    if (!text) {
        msgEl.style.display = 'block'; msgEl.style.color = '#e74c3c';
        msgEl.textContent = '鈿狅笍 鍐欑偣涓滆タ鍐嶅彂鐤晩锟?;
        setTimeout(() => msgEl.style.display = 'none', 2000);
        return;
    }
    if (text.length > 1000) {
        msgEl.style.display = 'block'; msgEl.style.color = '#e74c3c';
        msgEl.textContent = '鈿狅笍 澶暱浜嗭紒鐤篃瑕侀€傚彲鑰屾锟?;
        setTimeout(() => msgEl.style.display = 'none', 2000);
        return;
    }

    const chaos = Math.min(4, Math.max(1, Math.floor(text.length / 20) + 1));
    const tags = [];
    if (text.includes('鐟滀冀锟?) || text.includes('yoga') || text.includes('align')) tags.push('馃 鐟滀冀锟?);
    if (text.includes('鎬х櫀') || text.includes('瀹＄編')) tags.push('馃敒 鍝插');
    if (text.includes('锟?) || text.includes('锟?) || text.includes('鍥㈣喘')) tags.push('馃挵 鍓佹墜');
    if (text.includes('锟?) || text.includes('娣辫共')) tags.push('馃暤锟?閫忎笉锟?);
    if (chaos >= 3) tags.push('馃お 褰诲簳鐤媯');

    const msgs = loadMsgs();
    msgs.unshift({
        name: name,
        mood: mood,
        text: text,
        time: Date.now(),
        likes: 0,
        chaos: chaos,
        tags: tags,
        liked: false
    });
    saveMsgs(msgs);

    document.getElementById('chaosText').value = '';
    updateMadness();

    msgEl.style.display = 'block'; msgEl.style.color = '#27ae60';
    msgEl.textContent = '锟?鍙戠柉鎴愬姛锟?;
    setTimeout(() => msgEl.style.display = 'none', 1500);

    renderMsgs();
    if (chaos >= 4) triggerEmojiRain();
}

// 鍙戦殢鏈虹柉
function sendRandomChaos() {
    const msg = RANDOM_MSGS[Math.floor(Math.random() * RANDOM_MSGS.length)];
    document.getElementById('chaosText').value = msg;
    updateMadness();
    // 鑷姩鍙戯拷?    setTimeout(sendChaos, 300);
}

// 鐐硅禐
function likeMsg(i) {
    const msgs = loadMsgs();
    if (msgs[i]) {
        if (msgs[i].liked) {
            msgs[i].likes = Math.max(0, (msgs[i].likes || 0) - 1);
            msgs[i].liked = false;
        } else {
            msgs[i].likes = (msgs[i].likes || 0) + 1;
            msgs[i].liked = true;
        }
        saveMsgs(msgs);
        renderMsgs();
    }
}

// 鍥炲
function replyMsg(name) {
    document.getElementById('chaosText').value += `@${name} `;
    document.getElementById('chaosText').focus();
}

// 澶嶅埗
function copyMsg(i) {
    const msgs = loadMsgs();
    if (msgs[i]) {
        const text = `${msgs[i].name || '鍖垮悕閲庝汉'}锟?{msgs[i].text}`;
        navigator.clipboard.writeText(text).then(() => {
            const msgEl = document.getElementById('sendMsg');
            msgEl.style.display = 'block'; msgEl.style.color = '#27ae60';
            msgEl.textContent = '锟?宸插鍒跺埌鍓创鏉匡紒';
            setTimeout(() => msgEl.style.display = 'none', 1500);
        });
    }
}

// 鍒犻櫎
function deleteMsg(i) {
    const msgs = loadMsgs();
    msgs.splice(i, 1);
    saveMsgs(msgs);
    renderMsgs();
}

// 娓呯┖鍏ㄩ儴
function clearAll() {
    if (!confirm('馃挘 鐪熺殑瑕佹竻绌虹柉浜洪櫌鍚楋紵锛熸墍鏈夌柉瑷€鐤閮戒細娑堝け锟?)) return;
    if (!confirm('馃槇 浣犵‘瀹氾紵锛燂紵缇ゅ弸鐨勭柉璇濅篃寰堢弽璐电殑锟?)) return;
    saveMsgs([]);
    renderMsgs();
    document.getElementById('sendMsg').style.display = 'block';
    document.getElementById('sendMsg').style.color = '#856404';
    document.getElementById('sendMsg').textContent = '馃拃 鐤汉闄㈠凡娓呯┖鈥︹€﹂噸鏂板紑濮嬪惂';
    setTimeout(() => document.getElementById('sendMsg').style.display = 'none', 2000);
}

// Emoji 鏆撮洦 馃帀
function triggerEmojiRain() {
    const container = document.getElementById('emojiRain');
    for (let i = 0; i < 30; i++) {
        setTimeout(() => {
            const el = document.createElement('div');
            el.className = 'emoji-rain-item';
            el.textContent = EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
            el.style.left = Math.random() * 100 + '%';
            el.style.top = '-5%';
            el.style.animationDuration = (3 + Math.random() * 2) + 's';
            el.style.fontSize = (18 + Math.random() * 24) + 'px';
            container.appendChild(el);
            setTimeout(() => el.remove(), 5000);
        }, i * 80);
    }
}

    renderMsgs();
    document.getElementById('chaosText').addEventListener('keydown', e => {
        if (e.ctrlKey && e.key === 'Enter') sendChaos();
    });
    updateMadness();
});
