<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瑜伽裤百科</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', system-ui, sans-serif; min-height: 100vh; overflow-x: hidden; color: #fff; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; }

        .bg {
            position: fixed; inset: 0; z-index: 0;
            background:
                linear-gradient(180deg, rgba(10,10,18,0.15) 0%, rgba(10,10,18,0.65) 100%),
                url('https://images.pexels.com/photos/6453439/pexels-photo-6453439.jpeg?auto=compress&cs=tinysrgb&w=1920') center/cover no-repeat;
        }

        .content { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px 24px; }

        .badge { display: inline-block; padding: 6px 20px; border-radius: 40px; background: rgba(0,0,0,0.3); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); font-size: 12px; letter-spacing: 3px; margin-bottom: 24px; }

        h1 { font-size: clamp(40px, 7vw, 72px); font-weight: 900; letter-spacing: -2px; line-height: 1.05; margin-bottom: 12px; text-shadow: 0 2px 40px rgba(0,0,0,0.3); }
        h1 .g { background: linear-gradient(135deg, #e94560, #f5a623); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .sub { font-size: clamp(14px, 1.5vw, 17px); color: rgba(255,255,255,0.55); line-height: 1.8; max-width: 480px; margin: 0 auto 40px; font-weight: 400; letter-spacing: 0.3px; }
        .tl { font-size: 13px; color: rgba(255,255,255,0.2); letter-spacing: 5px; margin-top: 32px; text-shadow: 0 2px 20px rgba(0,0,0,0.2); }

        .cards { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; width: 100%; }
        .card { background: rgba(0,0,0,0.25); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; padding: 32px 24px; text-decoration: none; color: #fff; transition: all 0.4s; }
        .card:hover { transform: translateY(-6px); background: rgba(0,0,0,0.35); border-color: rgba(255,255,255,0.12); box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .card .icon { font-size: 32px; margin-bottom: 12px; display: block; }
        .card .num { font-size: 11px; color: rgba(255,255,255,0.25); letter-spacing: 2px; margin-bottom: 6px; }
        .card h3 { font-size: 19px; font-weight: 700; margin-bottom: 6px; }
        .card p { font-size: 13px; color: rgba(255,255,255,0.4); line-height: 1.6; font-weight: 400; }
        .card .arrow { display: inline-block; margin-top: 12px; font-size: 13px; color: rgba(255,255,255,0.25); transition: all 0.3s; }
        .card:hover .arrow { color: #e94560; transform: translateX(6px); }

        .fp { text-align: center; padding: 32px 24px 40px; color: rgba(255,255,255,0.1); font-size: 12px; letter-spacing: 2px; position: relative; z-index: 1; }

        @media (max-width: 700px) { .cards { grid-template-columns: 1fr; max-width: 380px; } .card { padding: 24px 20px; } }
    </style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
</head>
<body>
<!-- 登录弹窗 -->
<div id="loginModal" style="display:none;position:fixed;inset:0;z-index:999999;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);" onclick="this.style.display='none'">
    <div onclick="event.stopPropagation()" style="background:#fff;border-radius:20px;padding:32px;max-width:400px;width:90%;margin:10vh auto;box-shadow:0 20px 60px rgba(0,0,0,0.2);box-sizing:border-box;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
            <h2 style="font-size:20px;color:#333;margin:0;">🔐 登录</h2>
            <span onclick="document.getElementById('loginModal').style.display='none'" style="cursor:pointer;font-size:24px;color:#999;">✕</span>
        </div>
        <input id="loginEmail" type="email" placeholder="邮箱" style="width:100%;padding:12px 16px;border:2px solid #eee;border-radius:12px;font-size:15px;outline:none;margin-bottom:12px;box-sizing:border-box;">
        <input id="loginPassword" type="password" placeholder="密码" style="width:100%;padding:12px 16px;border:2px solid #eee;border-radius:12px;font-size:15px;outline:none;margin-bottom:16px;box-sizing:border-box;">
        <p id="loginError" style="color:#e74c3c;font-size:13px;margin-bottom:12px;display:none;"></p>
        <button onclick="handleLogin()" style="width:100%;padding:12px;border:none;border-radius:12px;background:linear-gradient(135deg,#e94560,#f5a623);color:#fff;font-size:16px;font-weight:700;cursor:pointer;">登录</button>
        <p style="text-align:center;margin-top:12px;font-size:13px;color:#888;">没有账号？<span onclick="var r=document.getElementById('registerArea');r.style.display=r.style.display==='none'?'block':'none'" style="color:#e94560;cursor:pointer;">注册</span></p>
        <div id="registerArea" style="display:none;margin-top:12px;">
            <button onclick="handleRegister()" style="width:100%;padding:12px;border:2px solid #e94560;border-radius:12px;background:transparent;color:#e94560;font-size:15px;font-weight:600;cursor:pointer;">注册新账号</button>
            <p style="font-size:12px;color:#aaa;text-align:center;margin-top:6px;">注册后会收到验证邮件</p>
        </div>
    </div>
</div>
<div class="bg"></div>
<div class="content">
    <div style="position:fixed;top:20px;right:24px;z-index:10;">
        <span class="login-btn" id="loginBtn" onclick="showLoginModal()">🔐 登录</span>
        <div class="user-menu" id="userMenu" onclick="logout()" title="点击退出" style="display:none;">
            <div class="user-avatar" id="userAvatar">?</div>
            <span class="user-name" id="userName">用户</span>
        </div>
    </div>
    <div class="badge">始于 2026 · 一个群聊玩笑</div>
    <h1>瑜伽裤 <span class="g">百科</span></h1>
    <p class="sub">品牌科普 · 面料科学 · 选购指南 · 群友整活</p>
    <div class="cards">
        <a href="guide.html" class="card"><span class="num">01</span><span class="icon">📖</span><h3>选购介绍</h3><p>品牌 · 面料 · 选购 · 养护</p><span class="arrow">→ 进入</span></a>
        <a href="fun.html" class="card"><span class="num">02</span><span class="icon">😂</span><h3>整活区</h3><p>投票 · 编年史 · 梗图 · 发疯</p><span class="arrow">→ 进入</span></a>
        <a href="forum.html" class="card"><span class="num">03</span><span class="icon">💬</span><h3>论坛</h3><p>分话题讨论 · 发帖交流</p><span class="arrow">→ 进入</span></a>
        <a href="quotes.html" class="card"><span class="num">04</span><span class="icon">💬</span><h3>语录区</h3><p>投稿 · 金句 · 讨论留言</p><span class="arrow">→ 进入</span></a>
    </div>
    <div class="tl">认真科普 · 大胆整活 · 尊重审美</div>
</div>
<div class="fp">YUGAKU.ONLINE</div>
</body>
</html>
