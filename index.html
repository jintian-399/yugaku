<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', system-ui, sans-serif; min-height: 100vh; overflow-x: hidden; color: #fff; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; }

        .bg {
            position: fixed; inset: 0; z-index: 0;

                linear-gradient(180deg, rgba(10,10,18,0.15) 0%, rgba(10,10,18,0.65) 100%),
                url('https://images.pexels.com/photos/6648616/pexels-photo-6648616.jpeg?auto=compress&cs=tinysrgb&w=1920') center/cover no-repeat;
        }

        .content { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px 24px; }

        .badge { display: inline-block; padding: 6px 20px; border-radius: 40px; background: rgba(0,0,0,0.3); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); font-size: 12px; letter-spacing: 3px; margin-bottom: 24px; }

        h1 { font-size: clamp(40px, 7vw, 72px); font-weight: 900; letter-spacing: -2px; line-height: 1.05; margin-bottom: 12px; text-shadow: 0 2px 40px rgba(0,0,0,0.3); }
        h1 .g { background: linear-gradient(135deg, #e94560, #f5a623); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .sub { font-size: clamp(14px, 1.5vw, 17px); color: rgba(255,255,255,0.55); line-height: 1.8; max-width: 480px; margin: 0 auto 40px; font-weight: 400; letter-spacing: 0.3px; }
        .tl { font-size: 13px; color: rgba(255,255,255,0.2); letter-spacing: 5px; margin-top: 32px; text-shadow: 0 2px 20px rgba(0,0,0,0.2); }

        .cards { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; width: 100%; }
        .card { background: rgba(0,0,0,0.25); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; padding: 32px 24px; text-decoration: none; color: #fff; transition: all 0.4s; }
        .card:hover { transform: translateY(-6px); background: rgba(0,0,0,0.35); border-color: rgba(255,255,255,0.12); box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .card .icon { font-size: 32px; margin-bottom: 12px; display: block; }
        .card .num { font-size: 11px; color: rgba(255,255,255,0.25); letter-spacing: 2px; margin-bottom: 6px; }
        .card h3 { font-size: 19px; font-weight: 700; margin-bottom: 6px; }
        .card p { font-size: 13px; color: rgba(255,255,255,0.4); line-height: 1.6; font-weight: 400; }
        .card .arrow { display: inline-block; margin-top: 12px; font-size: 13px; color: rgba(255,255,255,0.25); transition: all 0.3s; }
        .card:hover .arrow { color: #e94560; transform: translateX(6px); }

        .fp { text-align: center; padding: 32px 24px 40px; color: rgba(255,255,255,0.1); font-size: 12px; letter-spacing: 2px; position: relative; z-index: 1; }

        @media (max-width: 700px) { .cards { grid-template-columns: 1fr; max-width: 380px; } .card { padding: 24px 20px; } }
    </style>
</head>
<body>

</html>
