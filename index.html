<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瑜伽裤百科</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ===== 高级首页专属样式 ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; background: #0a0a12; color: #fff; overflow-x: hidden; min-height: 100vh; }

        /* ===== Hero 全屏 ===== */
        .hero {
            min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding: 40px 24px; position: relative;
            background: linear-gradient(135deg, #0a0a12 0%, #1a1a2e 40%, #0f3460 70%, #0a0a12 100%);
            overflow: hidden;
        }
        /* 背景装饰光晕 */
        .hero::before {
            content: ''; position: absolute; top: -30%; left: -20%; width: 140%; height: 140%;
            background: radial-gradient(ellipse at 30% 50%, rgba(233,69,96,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 50%, rgba(245,166,35,0.06) 0%, transparent 60%);
            pointer-events: none;
        }
        /* 背景网格纹理 */
        .hero::after {
            content: ''; position: absolute; inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .hero-content { position: relative; z-index: 2; max-width: 800px; }
        .hero-badge {
            display: inline-block; padding: 6px 20px; border-radius: 40px;
            background: rgba(233,69,96,0.15); border: 1px solid rgba(233,69,96,0.25);
            color: #e94560; font-size: 13px; font-weight: 600; letter-spacing: 2px;
            margin-bottom: 24px; backdrop-filter: blur(10px);
        }
        .hero h1 {
            font-size: clamp(42px, 8vw, 80px); font-weight: 900; letter-spacing: -2px;
            line-height: 1.05; margin-bottom: 16px;
        }
        .hero h1 .highlight {
            background: linear-gradient(135deg, #e94560, #f5a623, #e94560);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shimmer 4s ease-in-out infinite;
        }
        @keyframes shimmer { 0%,100%{background-position:0%} 50%{background-position:100%} }
        .hero p {
            font-size: clamp(16px, 2vw, 20px); color: rgba(255,255,255,0.5);
            line-height: 1.7; max-width: 560px; margin: 0 auto 40px; font-weight: 300;
        }
        .hero-tagline {
            font-size: 14px; color: rgba(255,255,255,0.2);
            letter-spacing: 4px; text-transform: uppercase; margin-top: 40px;
        }

        /* ===== 三入口卡片 ===== */
        .cards-section {
            position: relative; z-index: 2; margin-top: -80px; padding: 0 24px 80px;
        }
        .cards-grid {
            max-width: 1100px; margin: 0 auto;
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
        }
        .nav-card {
            background: rgba(255,255,255,0.03); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.06); border-radius: 24px;
            padding: 40px 32px; text-decoration: none; color: #fff;
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative; overflow: hidden;
        }
        .nav-card::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(180deg, transparent 60%, rgba(255,255,255,0.03));
            pointer-events: none;
        }
        .nav-card:hover {
            transform: translateY(-8px); border-color: rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.06); box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .nav-card:active { transform: translateY(-4px); }
        .nav-card .icon { font-size: 36px; margin-bottom: 16px; display: block; }
        .nav-card .num {
            font-size: 12px; color: rgba(255,255,255,0.2); letter-spacing: 2px;
            margin-bottom: 8px; font-weight: 500;
        }
        .nav-card h3 { font-size: 22px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
        .nav-card p { font-size: 14px; color: rgba(255,255,255,0.35); line-height: 1.7; font-weight: 300; }
        .nav-card .arrow {
            display: inline-block; margin-top: 16px; font-size: 14px;
            color: rgba(255,255,255,0.2); transition: all 0.3s;
        }
        .nav-card:hover .arrow { color: #e94560; transform: translateX(6px); }

        .nav-card.accent-1:hover { border-color: rgba(233,69,96,0.3); }
        .nav-card.accent-2:hover { border-color: rgba(245,166,35,0.3); }
        .nav-card.accent-3:hover { border-color: rgba(155,89,182,0.3); }

        /* ===== 分隔装饰 ===== */
        .divider {
            text-align: center; padding: 60px 24px 20px;
            color: rgba(255,255,255,0.08); font-size: 13px; letter-spacing: 6px;
        }

        /* ===== 底部 ===== */
        .footer-p {
            text-align: center; padding: 40px 24px 48px;
            color: rgba(255,255,255,0.15); font-size: 13px;
        }
        .footer-p a { color: rgba(255,255,255,0.25); text-decoration: none; }
        .footer-p a:hover { color: rgba(255,255,255,0.4); }

        /* ===== 响应式 ===== */
        @media (max-width: 900px) {
            .cards-grid { grid-template-columns: 1fr; max-width: 480px; gap: 16px; }
            .cards-section { margin-top: -40px; padding-bottom: 40px; }
            .nav-card { padding: 28px 24px; }
            .hero h1 { font-size: 36px; }
        }
        @media (max-width: 480px) {
            .nav-card h3 { font-size: 18px; }
        }

        /* ===== 浮动装饰粒子 ===== */
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        .float-particle {
            position: absolute; font-size: 20px; opacity: 0.03; pointer-events: none;
            animation: float 8s ease-in-out infinite;
        }
    </style>
</head>
<body>

</body>
</html>
