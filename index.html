<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瑜伽裤百科</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .landing { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 160px); text-align: center; padding: 40px 24px; }
        .landing h1 { font-size: 48px; font-weight: 900; margin-bottom: 8px; background: linear-gradient(90deg, #e94560, #f5a623, #e94560); background-size: 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 4s ease-in-out infinite; }
        @keyframes shimmer { 0%,100%{background-position:0%} 50%{background-position:100%} }
        .landing .sub { color: #888; font-size: 16px; margin-bottom: 40px; }
        .landing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; max-width: 800px; width: 100%; }
        .landing-card { background: #fff; border-radius: 20px; padding: 32px 24px; border: 1px solid #eee; transition: all 0.3s; text-decoration: none; color: inherit; }
        .landing-card:hover { transform: translateY(-6px); box-shadow: 0 12px 40px rgba(0,0,0,0.1); }
        .landing-card .icon { font-size: 40px; margin-bottom: 12px; }
        .landing-card h3 { font-size: 20px; margin-bottom: 6px; }
        .landing-card p { font-size: 14px; color: #888; line-height: 1.6; }
        .footer-mini { text-align: center; padding: 24px; color: #999; font-size: 13px; }
    </style>
</head>
<body>

<div class="landing">
    <h1>🧘‍♀️ 瑜伽裤百科</h1>
    <p class="sub">认真科普 · 大胆整活 · 尊重审美</p>
    <div class="landing-grid">
        <a href="guide.html" class="landing-card">
            <div class="icon">📖</div>
            <h3>选购介绍</h3>
            <p>品牌百科 · 面料实验室 · 选购指南 · 养护秘籍<br>———— 正经科普区</p>
        </a>
        <a href="fun.html" class="landing-card">
            <div class="icon">😂</div>
            <h3>整活区</h3>
            <p>透不透实验室 · 编年史 · 梗图 · 发疯评论区<br>———— 来都来了</p>
        </a>
        <a href="quotes.html" class="landing-card">
            <div class="icon">💬</div>
            <h3>语录区</h3>
            <p>群友投稿 · 金句排行 · 讨论留言<br>———— 总有一句说中你</p>
        </a>
    </div>
    <p style="margin-top: 40px; font-size: 13px; color: #bbb;">始于一个群聊玩笑 · yugaku.online</p>
</div>

</body>
</html>
